name: PvZMod APK Builder

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle
        
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Install tools & Fix files
      run: |
        sudo apt-get update -y
        sudo apt-get install -y dos2unix aapt
        chmod +x gradlew
        dos2unix gradlew *.gradle* || true
        
    - name: Fix AndroidManifest.xml
      run: |
        sed -i 's|<receiver android:name=".BootReceiver"[^>]*>|<receiver android:name=".BootReceiver" android:enabled="true" android:exported="false">|g' app/src/main/AndroidManifest.xml 2>/dev/null || true
        sed -i '/android:name="\.MainActivity"/a\    android:exported="true"' app/src/main/AndroidManifest.xml 2>/dev/null || true
        
    - name: Create resources
      run: |
        mkdir -p app/src/main/res/{layout,mipmap-hdpi,mipmap-mdpi,res/values}
        
        cat > app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">PvZ VIP MOD</string>
</resources>
EOF
        
    - name: Fix gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true
EOF
        
    - name: Build APK
      run: |
        ./gradlew clean
        ./gradlew assembleRelease --stacktrace
        
    - name: Verify APK
      run: |
        ls -la app/build/outputs/apk/release/
        aapt dump badging app/build/outputs/apk/release/app-release.apk
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PvZMod-APK
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
