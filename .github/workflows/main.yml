name: Build PvZMod APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # SHU QADAM QO'SHILDI: Agar gradle-wrapper.jar fayli yo'q bo'lsa, 
    # GitHub o'zi uni yuklab oladi va loyihaga joylaydi!
    - name: Generate missing Gradle Wrapper
      run: |
        echo "Gradle wrapper fayli tekshirilmoqda..."
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Fayl topilmadi, GitHub serverida yaratilmoqda..."
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          ./gradle-8.9/bin/gradle wrapper --gradle-version 8.9
          chmod +x gradlew
          rm -rf gradle-8.9-bin.zip gradle-8.9
          echo "Muvaffaqiyatli yaratildi!"
        else
          echo "Fayl bor, davom etilmoqda..."
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace
      env:
        GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.configureondemand=true -Dkotlin.incremental=false'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PvZMod-APK
        # Qattiq yo'l o'rniga, barcha release papkalarini qidiradi
        path: '**/build/outputs/apk/release/*.apk'
        retention-days: 30
