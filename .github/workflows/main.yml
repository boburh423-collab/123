name: Build PvZMod APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate missing Gradle Wrapper
      run: |
        echo "Gradle wrapper fayli tekshirilmoqda..."
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Fayl topilmadi, GitHub serverida yaratilmoqda..."
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          ./gradle-8.9/bin/gradle wrapper --gradle-version 8.9
          chmod +x gradlew
          rm -rf gradle-8.9-bin.zip gradle-8.9
          echo "Muvaffaqiyatli yaratildi!"
        else
          echo "Fayl bor, davom etilmoqda..."
          chmod +x gradlew
        fi

    - name: Fix build.gradle repository conflict
      run: |
        echo "build.gradle tuzatilmoqda..."
        sed -i '/^allprojects/,/^}/d' build.gradle

    - name: Fix AndroidManifest.xml errors
      run: |
        echo "Manifest tuzatilmoqda..."
        sed -i -E 's/[[:space:]]*package="[^"]*"//g' app/src/main/AndroidManifest.xml
        sed -i -E 's/[[:space:]]*android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml

    # >>> YANGI QO'SHILGAN QADAM: Yarim qolgan Java faylni majburiy yopish <<<
    - name: Fix broken LockScreenActivity.java
      run: |
        echo "LockScreenActivity.java fayli tuzatilmoqda..."
        # 58-qatordagi wakeLock so'ziga nuqta-vergul qo'yamiz
        sed -i 's/^        wakeLock$/        wakeLock;/' app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        # Faylning eng oxiriga yetishmayotgan class va method jingalak qavslarini qo'yamiz
        echo "    }" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "}" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java

    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace
      env:
        GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.configureondemand=true -Dkotlin.incremental=false'

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PvZMod-APK
        path: '**/build/outputs/apk/release/*.apk'
        retention-days: 30
