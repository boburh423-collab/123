name: Build PvZMod APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix line endings and permissions
      run: |
        sudo apt-get update
        sudo apt-get install -y dos2unix
        find . -type f -name "*.sh" -exec dos2unix {} \;
        find . -type f -name "gradlew" -exec dos2unix {} \;
        chmod +x gradlew
        # app/gradlew o'chirib tashlandi, chunki u ko'p hollarda mavjud emas

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v2

    - name: Build with Gradle
      run: |
        ./gradlew assembleRelease --stacktrace
      env:
        GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.configureondemand=true -Dkotlin.incremental=false'

    # SHU QADAMNI DIQQAT BILANG O'QING:
    # Agar fayl mavjud bo'lsa, nomini o'zgartiramiz. Agar yo'q bo'lsa, xato bermasdan, 
    # loyihada APK qidirib ko'ramiz va xato haqida to'liq ma'lumot beramiz.
    - name: Rename APK
      run: |
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          echo "✅ APK topildi, nomini o'zgartiryapman..."
          mv app/build/outputs/apk/release/app-release.apk PvZMod.apk
        else
          echo "❌ Kutilgan joyda APK topilmadi. Barcha papkalarni qidiraman:"
          find . -type f -name "*.apk"
          echo " agar yuqorida hech narsa chiqmagan bo'lsa, demak Gradle buildni bekor qildi (Proguard xatosi mumkin)."
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PvZMod-APK
        path: PvZMod.apk
        retention-days: 30
