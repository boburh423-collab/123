name: PvZMod Builder
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        
    # 1-QADAM: GRADLE WRAPPER NI ENG ISHONCHLI USULDA YUKLAYMIZ VA SOZLAMIZ
    - name: Setup Gradle Wrapper
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip
        mkdir -p gradle/wrapper
        cp gradle-8.9/lib/gradle-wrapper-8.9.jar gradle/wrapper/gradle-wrapper.jar
        printf "distributionBase=GRADLE_USER_HOME\n\
        distributionPath=wrapper/dists\n\
        distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-bin.zip\n\
        zipStoreBase=GRADLE_USER_HOME\n\
        zipStorePath=wrapper/dists\n" > gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew
        rm -rf gradle-8.9-bin.zip gradle-8.9

    - name: Fix files
      run: |
        sudo apt-get install -y dos2unix aapt
        dos2unix gradlew *.gradle* || true
        
    - name: Fix build.gradle
      run: sed -i '/^allprojects/,/^}/d' build.gradle || true

    - name: Fix AndroidManifest.xml
      run: |
        sed -i -E 's/[[:space:]]*package="[^"]*"//g' app/src/main/AndroidManifest.xml || true
        sed -i -E 's/[[:space:]]*android:icon="@mipmap\/ic_launcher"//g' app/src/main/AndroidManifest.xml || true
        sed -i 's|<receiver android:name=".BootReceiver"[^>]*>|<receiver android:name=".BootReceiver" android:exported="false">|g' app/src/main/AndroidManifest.xml || true
    
    - name: Fix broken LockScreenActivity.java
      run: |
        mkdir -p app/src/main/java/com/pvzmod/game
        echo "package com.pvzmod.game;" > app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "import android.app.Activity;" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "import android.os.Bundle;" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "public class LockScreenActivity extends Activity {" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "    @Override" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "    protected void onCreate(Bundle savedInstanceState) {" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "        super.onCreate(savedInstanceState);" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "    }" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java
        echo "}" >> app/src/main/java/com/pvzmod/game/LockScreenActivity.java

    - name: Create resources
      run: mkdir -p app/src/main/res/values && echo '<?xml version="1.0"?><resources><string name="app_name">PvZ VIP</string></resources>' > app/src/main/res/values/strings.xml
    
    - name: Build
      run: ./gradlew clean assembleRelease
      
    - uses: actions/upload-artifact@v4
      with:
        name: PvZMod.apk
        path: '**/build/outputs/apk/release/*.apk'
