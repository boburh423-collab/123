name: Final Build Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permissions
        run: chmod +x gradlew

      - name: Build and show errors
        run: ./gradlew assembleDebug --stacktrace --info || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PvZMod-APK
          path: '**/build/outputs/apk/debug/*.apk'
