name: Build PvZMod APK - FULLY FIXED

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main ]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    # 2. JDK 17
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
        
    # 3. Cache Gradle
    - name: Cache Gradle & Wrapper
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    # 4. Fix line endings & permissions
    - name: Fix line endings & chmod
      run: |
        sudo apt-get update -y
        sudo apt-get install -y dos2unix
        find . -name "*.sh" -exec dos2unix {} \; || true
        find . -name "*.gradle" -exec dos2unix {} \; || true
        find . -name "gradlew" -exec chmod +x {} \; || true
        chmod +x gradlew || true
        dos2unix gradlew || true
        
    # 5. ✅ AUTO-FIX Manifest (android:exported)
    - name: Fix AndroidManifest.xml
      run: |
        # BootReceiver exported="false"
        sed -i 's|<receiver android:name=".BootReceiver"[^>]*>|<receiver android:name=".BootReceiver" android:enabled="true" android:exported="false">|g' app/src/main/AndroidManifest.xml
        # LockScreenActivity exported="false"
        sed -i 's|<activity\n *android:name=".LockScreenActivity"|<activity\n    android:name=".LockScreenActivity"\n    android:exported="false"|' app/src/main/AndroidManifest.xml
        # MainActivity exported="true" (mavjud)
        sed -i 's|<activity\n *android:name=".MainActivity"|<activity\n    android:name=".MainActivity"\n    android:exported="true"|' app/src/main/AndroidManifest.xml
        
    # 6. Create missing dirs & mipmap
    - name: Setup resources
      run: |
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        # Dummy launcher icon
        echo '<?xml version="1.0" encoding="utf-8"?><shape xmlns:android="http://schemas.android.com/apk/res/android"><solid android:color="#00FF00"/></shape>' > app/src/main/res/mipmap-hdpi/ic_launcher.png
        
    # 7. BUILD!
    - name: Build Release APK
      run: |
        ./gradlew clean --no-daemon
        ./gradlew assembleRelease --stacktrace --info --no-daemon
        
    # 8. Verify APK
    - name: Verify APK
      run: |
        ls -la app/build/outputs/apk/release/
        aapt dump badging app/build/outputs/apk/release/app-release.apk | grep package
        unzip -l app/build/outputs/apk/release/app-release.apk | head -20
        
    # 9. Upload APK
    - name: Upload PvZMod.apk
      uses: actions/upload-artifact@v4
      with:
        name: PvZMod-release-apk
        path: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    # 10. Obfuscation report
    - name: Upload ProGuard mapping
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: proguard-mapping
        path: |
          app/build/outputs/mapping/release/
          
    # 11. Build logs
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          build/
